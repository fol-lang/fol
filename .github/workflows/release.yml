name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  toolchain:
    name: toolchain ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-linux
          - runner: ubuntu-24.04-arm
            target: aarch64-linux
          - runner: macos-13
            target: x86_64-macos
          - runner: macos-latest
            target: aarch64-macos
    steps:
      - name: Checkout FOL
        uses: actions/checkout@v4
        with:
          path: fol

      # fol-interop consumes these as ../../../../{parc,linc,gerc} path
      # dependencies, so they must sit next to the fol checkout.
      - name: Checkout PARC
        uses: actions/checkout@v4
        with:
          repository: fol-lang/parc
          ref: 0f52aeeeeec47a082c0d8a515130ee853aa1101d
          path: parc

      - name: Checkout LINC
        uses: actions/checkout@v4
        with:
          repository: fol-lang/linc
          ref: c874d5b0332249524422d9d08c35b3d4edd7e3fa
          path: linc

      - name: Checkout GERC
        uses: actions/checkout@v4
        with:
          repository: fol-lang/gerc
          ref: 000c1f6c12fba99f1a157267ee7db39d42bda8e3
          path: gerc

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build folc and fol
        working-directory: fol
        run: |
          cargo build --release --bin folc
          cargo build --release -p fol-self

      - name: Stage and pack toolchain
        working-directory: fol
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="$(mktemp -d)"
          cp target/release/folc "$STAGE/folc"
          cp -R lang/library/std "$STAGE/std"
          # Archive root must hold exactly {folc, std/} — `fol self install`
          # unpacks it straight into $FOL_HOME/toolchains/v$VERSION/.
          tar -czf "fol-compiler-and-lib-v${VERSION}-${{ matrix.target }}.tar.gz" -C "$STAGE" folc std
          # fol itself, ready to drop on PATH.
          cp target/release/fol "fol-v${VERSION}-${{ matrix.target }}"

      - name: Upload release assets
        working-directory: fol
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "fol $GITHUB_REF_NAME" \
            --notes "FOL toolchain $GITHUB_REF_NAME — install with: fol self install $VERSION" \
            2>/dev/null || true
          gh release upload "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            "fol-compiler-and-lib-v${VERSION}-${{ matrix.target }}.tar.gz" \
            "fol-v${VERSION}-${{ matrix.target }}" \
            --clobber
