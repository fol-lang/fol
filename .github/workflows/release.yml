name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  toolchain:
    name: toolchain ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-linux
          - runner: ubuntu-24.04-arm
            target: aarch64-linux
          - runner: macos-13
            target: x86_64-macos
          - runner: macos-latest
            target: aarch64-macos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build folc and fol
        run: |
          cargo build --release --bin folc
          cargo build --release -p fol-self

      - name: Stage and pack toolchain
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="$(mktemp -d)"
          cp target/release/folc "$STAGE/folc"
          cp -R lang/library/std "$STAGE/std"
          # Archive root must hold exactly {folc, std/} — `fol self install`
          # unpacks it straight into $FOL_HOME/toolchains/v$VERSION/.
          tar -czf "fol-v${VERSION}-${{ matrix.target }}.tar.gz" -C "$STAGE" folc std
          # The manager itself, as a standalone bootstrap binary.
          cp target/release/fol "fol-manager-v${VERSION}-${{ matrix.target }}"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --title "fol $GITHUB_REF_NAME" \
            --notes "FOL toolchain $GITHUB_REF_NAME — install with: fol self install $VERSION" \
            2>/dev/null || true
          gh release upload "$GITHUB_REF_NAME" \
            "fol-v${VERSION}-${{ matrix.target }}.tar.gz" \
            "fol-manager-v${VERSION}-${{ matrix.target }}" \
            --clobber
