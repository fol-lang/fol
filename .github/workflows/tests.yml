name: tests

on:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["develop"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout FOL
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: fol
          fetch-depth: 0

      - name: Checkout PARC
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: fol-lang/parc
          ref: 0f52aeeeeec47a082c0d8a515130ee853aa1101d
          path: parc

      - name: Checkout LINC
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: fol-lang/linc
          ref: c874d5b0332249524422d9d08c35b3d4edd7e3fa
          path: linc

      - name: Checkout GERC
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: fol-lang/gerc
          ref: 000c1f6c12fba99f1a157267ee7db39d42bda8e3
          path: gerc

      - name: Install Rust 1.89
        run: |
          rustup toolchain install 1.89.0 --profile minimal
          rustup component add --toolchain 1.89.0 rustfmt clippy
          rustup default 1.89.0

      - name: Install tree-sitter CLI
        run: cargo install tree-sitter-cli --version 0.26.8 --locked

      - name: Install native prerequisites
        run: sudo apt-get update && sudo apt-get install --yes binutils build-essential

      - name: Run repository verification
        working-directory: fol
        run: make verify
