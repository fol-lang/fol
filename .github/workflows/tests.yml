name: tests

on:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["develop"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout FOL
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: fol
          fetch-depth: 0

      - name: Checkout PARC
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: follang/lang-c
          ref: ba603cdccc9375473eca0c42e5462cf90b6da249
          path: parc

      - name: Checkout LINC
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: follang/linc
          ref: 37c8fb16171114b39e2283ff4b9e351fa2d5975b
          path: linc

      - name: Checkout GERC
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: follang/gerc
          ref: 423b14aec40f509de64152ec1fcc74a9371154f1
          path: gerc

      - name: Install Rust 1.89
        run: |
          rustup toolchain install 1.89.0 --profile minimal
          rustup component add --toolchain 1.89.0 rustfmt clippy
          rustup default 1.89.0

      - name: Install native prerequisites
        run: sudo apt-get update && sudo apt-get install --yes binutils build-essential

      - name: Run repository verification
        working-directory: fol
        run: make verify
